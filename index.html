<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NailAI — AR Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0eee8; --muted: #888580; --accent: #c9a96e; --accent2: #e8c99a;
    --font-body: system-ui, -apple-system, sans-serif;
    --font-mono: 'Courier New', monospace;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; overflow-y: auto; }
  header { display:flex; align-items:center; justify-content:space-between; padding:0 16px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
  .logo-word { font-size:20px; font-weight:600; color:var(--accent2); letter-spacing:-0.02em; }
  .logo-tag  { font-size:11px; color:var(--muted); margin-left:8px; font-family:var(--font-mono); }
  .header-status { display:flex; gap:12px; }
  .status-pill { display:flex; align-items:center; gap:5px; font-size:11px; font-family:var(--font-mono); color:var(--muted); }
  .status-dot { width:6px; height:6px; border-radius:50%; background:#444; transition:background 0.3s; }
  .status-dot.active  { background:#4caf82; }
  .status-dot.loading { background:var(--accent); animation:pulse 1s infinite; }
  .status-dot.error   { background:#e05a5a; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .main { display:flex; flex-direction:column; }
  @media (min-width:768px) { .main { flex-direction:row; min-height:calc(100vh - 52px); } }
  .camera-area { position:relative; background:#000; flex:1; min-height:300px; }
  @media (min-width:768px) { .camera-area { min-height:calc(100vh - 52px); } }
  video { width:100%; height:100%; object-fit:cover; display:block; }
  canvas#output { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .cam-loader { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; gap:14px; }
  .cam-loader-text { font-family:var(--font-mono); font-size:12px; color:var(--muted); text-align:center; padding:0 20px; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cam-controls { position:absolute; bottom:16px; right:16px; display:none; flex-direction:column; gap:8px; }
  .cam-btn { width:48px; height:48px; border-radius:50%; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.25); color:white; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); transition:background 0.2s; -webkit-tap-highlight-color:transparent; }
  .cam-btn:active { transform:scale(0.9); background:rgba(0,0,0,0.8); }
  .fps-badge { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:11px; color:rgba(255,255,255,0.25); }
  .guide-corner { position:absolute; width:28px; height:28px; }
  .guide-corner::before, .guide-corner::after { content:''; position:absolute; background:var(--accent); opacity:0.4; }
  .guide-corner::before { width:2px; height:100%; top:0; }
  .guide-corner::after  { width:100%; height:2px; top:0; }
  .gc-tl { top:16px; left:16px; }
  .gc-tr { top:16px; right:16px; transform:scaleX(-1); }
  .gc-bl { bottom:16px; left:16px; transform:scaleY(-1); }
  .gc-br { bottom:16px; right:16px; transform:scale(-1); }
  aside { width:100%; background:var(--surface); border-top:1px solid var(--border); padding-bottom:24px; }
  @media (min-width:768px) { aside { width:300px; border-top:none; border-left:1px solid var(--border); overflow-y:auto; } }
  .section { padding:16px 16px 0; }
  .section-label { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .divider { height:1px; background:var(--border); margin:14px 0 0; }
  .model-drop { border:1.5px dashed var(--border2); border-radius:12px; padding:16px 12px; text-align:center; cursor:pointer; position:relative; transition:border-color 0.2s; }
  .model-drop input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { font-size:22px; margin-bottom:6px; opacity:0.4; }
  .drop-text { font-size:13px; color:var(--muted); line-height:1.5; }
  .drop-text strong { color:var(--accent2); font-weight:500; }
  .drop-hint { font-size:11px; font-family:var(--font-mono); color:#444; margin-top:4px; }
  .model-loaded { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--surface2); border-radius:12px; border:1px solid var(--border); }
  .model-icon { width:32px; height:32px; border-radius:8px; background:rgba(201,169,110,0.15); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .model-info { flex:1; min-width:0; }
  .model-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .model-size { font-size:11px; font-family:var(--font-mono); color:var(--muted); margin-top:2px; }
  .model-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; border-radius:6px; flex-shrink:0; }
  .palette-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:12px; }
  .color-swatch { aspect-ratio:1; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform 0.15s, border-color 0.15s; -webkit-tap-highlight-color:transparent; }
  .color-swatch:active { transform:scale(1.12); }
  .color-swatch.active { border-color:var(--text); transform:scale(1.12); }
  .custom-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .custom-row label { font-size:12px; color:var(--muted); flex:1; }
  input[type=color] { width:36px; height:36px; border:none; border-radius:50%; cursor:pointer; padding:0; background:none; overflow:hidden; }
  input[type=color]::-webkit-color-swatch-wrapper { padding:0; border-radius:50%; }
  input[type=color]::-webkit-color-swatch { border:none; border-radius:50%; }
  .slider-row { margin-bottom:14px; }
  .slider-header { display:flex; justify-content:space-between; margin-bottom:8px; }
  .slider-label { font-size:12px; color:var(--muted); }
  .slider-val { font-size:12px; font-family:var(--font-mono); color:var(--accent2); }
  input[type=range] { width:100%; height:4px; -webkit-appearance:none; background:var(--surface2); border-radius:2px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .toggle-label { font-size:12px; color:var(--muted); }
  .toggle { width:38px; height:22px; background:var(--surface2); border-radius:11px; border:1px solid var(--border2); cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
  .toggle.on { background:var(--accent); border-color:var(--accent); }
  .toggle::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:white; top:2px; left:2px; transition:left 0.2s; }
  .toggle.on::after { left:18px; }
  select { width:100%; background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-family:var(--font-mono); font-size:12px; padding:8px 10px; border-radius:8px; outline:none; -webkit-appearance:none; appearance:none; margin-bottom:14px; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .stat-card { background:var(--surface2); border-radius:10px; padding:10px 12px; border:1px solid var(--border); }
  .stat-name { font-size:10px; font-family:var(--font-mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .stat-val { font-size:18px; font-family:var(--font-mono); font-weight:500; }
  .stat-val.accent { color:var(--accent2); }
  .start-btn { display:block; width:calc(100% - 32px); margin:16px; padding:14px; background:var(--accent); border:none; border-radius:12px; color:#1a1208; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; -webkit-tap-highlight-color:transparent; }
  .start-btn:active { background:var(--accent2); transform:scale(0.98); }
  .start-btn:disabled { background:var(--surface2); color:var(--muted); }
  .error-box { background:rgba(224,90,90,0.1); border:1px solid rgba(224,90,90,0.3); border-radius:10px; padding:12px 14px; font-size:12px; font-family:var(--font-mono); color:#e05a5a; margin-top:8px; line-height:1.6; display:none; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:10px 18px; font-size:13px; font-family:var(--font-mono); color:var(--text); z-index:100; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.err { border-color:rgba(224,90,90,0.4); color:#e05a5a; }
</style>
</head>
<body>
<header>
  <div><span class="logo-word">NailAI</span><span class="logo-tag">AR Demo</span></div>
  <div class="header-status">
    <div class="status-pill"><div class="status-dot" id="dot-mp"></div><span>MP</span></div>
    <div class="status-pill"><div class="status-dot" id="dot-onnx"></div><span>ONNX</span></div>
    <div class="status-pill"><div class="status-dot" id="dot-cam"></div><span>Cam</span></div>
  </div>
</header>

<div class="main">
  <div class="camera-area">
    <div class="cam-loader" id="cam-loader">
      <div class="spinner"></div>
      <div class="cam-loader-text" id="loader-text">Press Start Camera</div>
    </div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="output"></canvas>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
      <div class="guide-corner gc-tl"></div><div class="guide-corner gc-tr"></div>
      <div class="guide-corner gc-bl"></div><div class="guide-corner gc-br"></div>
      <div class="fps-badge" id="fps-badge"></div>
    </div>
    <div class="cam-controls" id="cam-controls">
      <button class="cam-btn" id="btn-flip" title="Switch camera">⇄</button>
    </div>
  </div>

  <aside>
    <div class="section">
      <div class="section-label" style="margin-top:16px;">Model (ONNX)</div>
      <div id="model-area" class="model-drop">
        <input type="file" id="model-file" accept=".onnx">
        <div class="drop-icon">◈</div>
        <div class="drop-text"><strong>Drop .onnx file</strong><br>or tap to browse</div>
        <div class="drop-hint">U-Net · 256×256 · ImageNet norm</div>
      </div>
      <div class="error-box" id="error-box"></div>
    </div>

    <div class="section">
      <div class="divider"></div>
      <div class="section-label" style="margin-top:14px;">Nail Color</div>
      <div class="palette-grid" id="palette"></div>
      <div class="custom-row"><label>Custom</label><input type="color" id="custom-color" value="#ff2255"></div>
    </div>

    <div class="section">
      <div class="divider"></div>
      <div class="section-label" style="margin-top:14px;">Rendering</div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-label">Opacity</span><span class="slider-val" id="v-opacity">75%</span></div>
        <input type="range" id="s-opacity" min="10" max="100" value="75" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-label">Mask threshold</span><span class="slider-val" id="v-thresh">0.50</span></div>
        <input type="range" id="s-thresh" min="1" max="99" value="50" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-label">Edge blur</span><span class="slider-val" id="v-blur">2px</span></div>
        <input type="range" id="s-blur" min="0" max="12" value="2" step="1">
      </div>
      <div class="toggle-row"><span class="toggle-label">Show landmarks</span><div class="toggle" id="t-lm"></div></div>
      <div class="toggle-row"><span class="toggle-label">Show mask debug</span><div class="toggle" id="t-mask"></div></div>
      <div class="toggle-row"><span class="toggle-label">Mirror (front cam)</span><div class="toggle on" id="t-mirror"></div></div>
      <div class="slider-label" style="margin-bottom:8px;">Blend mode</div>
      <select id="blend-mode">
        <option value="source-over">Normal</option>
        <option value="multiply">Multiply</option>
        <option value="overlay">Overlay</option>
        <option value="color">Color</option>
        <option value="soft-light">Soft light</option>
      </select>
    </div>

    <div class="section">
      <div class="divider"></div>
      <div class="section-label" style="margin-top:14px;">Stats</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-name">FPS</div><div class="stat-val accent" id="st-fps">—</div></div>
        <div class="stat-card"><div class="stat-name">Infer ms</div><div class="stat-val" id="st-infer">—</div></div>
        <div class="stat-card"><div class="stat-name">Nails</div><div class="stat-val" id="st-nails">—</div></div>
        <div class="stat-card"><div class="stat-name">Hands</div><div class="stat-val" id="st-hands">—</div></div>
      </div>
    </div>

    <button class="start-btn" id="start-btn">Start Camera</button>
  </aside>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"></script>
<script>
const MODEL_SIZE = 256;
const NAIL_TIPS  = [4, 8, 12, 16, 20];
const NAIL_DIP   = [3, 7, 11, 15, 19];
const COLORS = ['#ff2255','#ff6699','#ffaacc','#cc44ff','#7744ff','#ff6633','#ff9933','#ffcc22','#33ddaa','#2299ff','#cc2244','#1a1a1a'];

let currentColor  = COLORS[0];
let onnxSession   = null;
let handLandmarks = [];
let running       = false;
let isMirror      = true;
let facingMode    = 'user';
let currentStream = null;
let showLandmarks = false, showMask = false;
let nailQueue     = 0;
let nailMasks     = new Array(5).fill(null);
let frameCount    = 0, lastFpsTime = performance.now();

if (typeof ort !== 'undefined') {
  ort.env.wasm.numThreads = 1;
  ort.env.wasm.simd = true;
  ort.env.wasm.wasmPaths = 'https://unpkg.com/onnxruntime-web@1.18.0/dist/';
}

const video      = document.getElementById('video');
const canvas     = document.getElementById('output');
const ctx        = canvas.getContext('2d');
const startBtn   = document.getElementById('start-btn');
const camLoader  = document.getElementById('cam-loader');
const loaderText = document.getElementById('loader-text');
const errorBox   = document.getElementById('error-box');
const toast      = document.getElementById('toast');

function setDot(id, s) { document.getElementById('dot-'+id).className = 'status-dot '+(s==='idle'?'':s); }
let toastTimer;
function showToast(msg, e=false) { clearTimeout(toastTimer); toast.textContent=msg; toast.className='toast show'+(e?' err':''); toastTimer=setTimeout(()=>toast.className='toast',3000); }
function showError(msg) { errorBox.style.display='block'; errorBox.textContent='⚠ '+msg; }

// Palette
function renderPalette() {
  const g = document.getElementById('palette'); g.innerHTML='';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(c===currentColor?' active':'');
    sw.style.background = c;
    sw.onclick = () => { currentColor=c; nailMasks.fill(null); renderPalette(); };
    g.appendChild(sw);
  });
}
renderPalette();
document.getElementById('custom-color').oninput = e => { currentColor=e.target.value; nailMasks.fill(null); renderPalette(); };

// Sliders
document.getElementById('s-opacity').oninput = e => document.getElementById('v-opacity').textContent = e.target.value+'%';
document.getElementById('s-thresh').oninput  = e => { document.getElementById('v-thresh').textContent=(e.target.value/100).toFixed(2); nailMasks.fill(null); };
document.getElementById('s-blur').oninput    = e => document.getElementById('v-blur').textContent = e.target.value+'px';

// Toggles
function initToggle(id, init, cb) {
  const el = document.getElementById(id);
  if (init) el.classList.add('on');
  el.onclick = () => { el.classList.toggle('on'); cb(el.classList.contains('on')); };
}
initToggle('t-lm',   false, v => showLandmarks=v);
initToggle('t-mask', false, v => showMask=v);
initToggle('t-mirror', true, v => {
  isMirror=v;
  video.style.transform  = v ? 'scaleX(-1)' : 'none';
  canvas.style.transform = v ? 'scaleX(-1)' : 'none';
});
video.style.transform = canvas.style.transform = 'scaleX(-1)';

// Model
function setupDrop(areaId, inputId) {
  const area=document.getElementById(areaId), inp=document.getElementById(inputId);
  if (!area||!inp) return;
  area.addEventListener('dragover', e=>{e.preventDefault(); area.style.borderColor='var(--accent)';});
  area.addEventListener('dragleave', ()=>area.style.borderColor='');
  area.addEventListener('drop', e=>{e.preventDefault(); area.style.borderColor=''; if(e.dataTransfer.files[0]) loadModel(e.dataTransfer.files[0]);});
  inp.onchange = ()=>{ if(inp.files[0]) loadModel(inp.files[0]); };
}
setupDrop('model-area','model-file');

async function loadModel(file) {
  if (!file.name.endsWith('.onnx')) { showError('Please select a .onnx file'); return; }
  errorBox.style.display='none'; setDot('onnx','loading');
  try {
    const buf = await file.arrayBuffer();
    onnxSession = await ort.InferenceSession.create(buf, { executionProviders:['wasm'], graphOptimizationLevel:'all' });
    const mb = (file.size/1024/1024).toFixed(1);
    setDot('onnx','active'); nailMasks.fill(null); showToast('Model loaded · '+mb+' MB');
    document.getElementById('model-area').outerHTML =
      `<div class="model-loaded" id="model-area">
        <div class="model-icon">◈</div>
        <div class="model-info"><div class="model-name">${file.name}</div><div class="model-size">${mb} MB · wasm · 1 thread</div></div>
        <button class="model-remove" onclick="unloadModel()">✕</button>
      </div>`;
  } catch(e) { setDot('onnx','error'); showError('Failed: '+e.message); console.error(e); }
}
function unloadModel() {
  onnxSession=null; nailMasks.fill(null); setDot('onnx','idle');
  document.getElementById('model-area').outerHTML =
    `<div id="model-area" class="model-drop"><input type="file" id="model-file" accept=".onnx">
    <div class="drop-icon">◈</div><div class="drop-text"><strong>Drop .onnx file</strong><br>or tap to browse</div>
    <div class="drop-hint">U-Net · 256×256 · ImageNet norm</div></div>`;
  setupDrop('model-area','model-file');
}

// Camera
async function startCam(facing) {
  if (currentStream) currentStream.getTracks().forEach(t=>t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:facing, width:{ideal:1280}, height:{ideal:720}}, audio:false });
  currentStream=stream; video.srcObject=stream;
  await new Promise((res,rej)=>{ video.onloadedmetadata=res; setTimeout(rej,8000); });
  await video.play();
  canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
}

document.getElementById('btn-flip').onclick = async () => {
  facingMode = facingMode==='user'?'environment':'user';
  isMirror = facingMode==='user';
  video.style.transform = canvas.style.transform = isMirror?'scaleX(-1)':'none';
  document.getElementById('t-mirror').className = 'toggle'+(isMirror?' on':'');
  nailMasks.fill(null);
  try { await startCam(facingMode); } catch(e) { showToast('Cannot switch camera',true); }
};

startBtn.onclick = async () => {
  if (running) return;
  startBtn.disabled=true; startBtn.textContent='Starting…'; errorBox.style.display='none';
  try {
    loaderText.textContent='Requesting camera…'; setDot('cam','loading');
    await startCam(facingMode);
    setDot('cam','active'); running=true;
  } catch(e) {
    setDot('cam','error'); showError('Camera: '+e.message);
    startBtn.disabled=false; startBtn.textContent='Start Camera'; return;
  }
  try {
    loaderText.textContent='Loading MediaPipe…'; setDot('mp','loading');
    const h = new Hands({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
    h.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.65, minTrackingConfidence:0.55 });
    h.onResults(r => { handLandmarks=(r.multiHandLandmarks||[]).slice(0,1); document.getElementById('st-hands').textContent=handLandmarks.length; });
    await h.initialize();
    setDot('mp','active'); window._mp=h;
  } catch(e) { setDot('mp','error'); showToast('MediaPipe failed',true); }
  camLoader.style.display='none';
  document.getElementById('cam-controls').style.display='flex';
  startBtn.textContent='Running…';
  requestAnimationFrame(loop);
};

// Main loop
async function loop() {
  if (!running) return;
  requestAnimationFrame(loop);
  const now=performance.now(); frameCount++;
  if (now-lastFpsTime>600) {
    const fps=Math.round(frameCount/((now-lastFpsTime)/1000));
    frameCount=0; lastFpsTime=now;
    document.getElementById('fps-badge').textContent=fps+' fps';
    document.getElementById('st-fps').textContent=fps;
  }
  canvas.width=video.videoWidth||canvas.width;
  canvas.height=video.videoHeight||canvas.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (window._mp) { try { await window._mp.send({image:video}); } catch(e){} }
  if (!handLandmarks.length) { document.getElementById('st-nails').textContent='—'; return; }

  const lm=handLandmarks[0];
  const opacity=document.getElementById('s-opacity').value/100;
  const threshold=document.getElementById('s-thresh').value/100;
  const edgeBlur=parseInt(document.getElementById('s-blur').value);
  const blendMode=document.getElementById('blend-mode').value;
  const W=canvas.width, H=canvas.height;

  // Landmarks: MediaPipe returns coords in original video space
  // canvas is CSS-mirrored so we draw directly without transform
  if (showLandmarks && typeof drawConnectors!=='undefined') {
    drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:'rgba(255,255,255,0.2)',lineWidth:1});
    drawLandmarks(ctx,lm,{color:'rgba(201,169,110,0.6)',radius:3});
  }

  // One nail per frame
  const i=nailQueue; nailQueue=(nailQueue+1)%5;
  const tip=lm[NAIL_TIPS[i]], dip=lm[NAIL_DIP[i]];
  if (tip&&dip) {
    const cx=tip.x*W, cy=tip.y*H;
    const dx=(tip.x-dip.x)*W, dy=(tip.y-dip.y)*H;
    const nailLen=Math.sqrt(dx*dx+dy*dy);
    const roiSize=Math.max(nailLen*3.0,40);
    const rx=Math.max(0,Math.round(cx-roiSize/2));
    const ry=Math.max(0,Math.round(cy-roiSize/2));
    const rw=Math.min(Math.round(roiSize),W-rx);
    const rh=Math.min(Math.round(roiSize),H-ry);
    if (rw>=16&&rh>=16) {
      if (onnxSession) {
        try {
          const t0=performance.now();
          const mask=await runOnnx(video,rx,ry,rw,rh,threshold);
          document.getElementById('st-infer').textContent=Math.round(performance.now()-t0);
          nailMasks[i]=mask?{mask,rx,ry,rw,rh}:null;
        } catch(e){ console.warn(e); }
      } else {
        nailMasks[i]={placeholder:true,cx,cy,nailLen,dx,dy};
      }
    }
  }

  // Draw all cached masks
  let nc=0;
  for (let j=0;j<5;j++) {
    const nm=nailMasks[j]; if(!nm) continue; nc++;
    if (nm.placeholder) drawPlaceholder(nm.cx,nm.cy,nm.nailLen,nm.dx,nm.dy,opacity,blendMode);
    else overlayMask(nm.mask,nm.rx,nm.ry,nm.rw,nm.rh,opacity,edgeBlur,blendMode);
  }
  document.getElementById('st-nails').textContent=nc;
}

// ONNX
const _off=document.createElement('canvas').getContext('2d');
async function runOnnx(src,sx,sy,sw,sh,threshold) {
  const S=MODEL_SIZE;
  _off.canvas.width=S; _off.canvas.height=S;
  _off.drawImage(src,sx,sy,sw,sh,0,0,S,S);
  const {data}=_off.getImageData(0,0,S,S);
  const inp=new Float32Array(3*S*S);
  const mean=[0.485,0.456,0.406],std=[0.229,0.224,0.225];
  for (let i=0;i<S*S;i++) {
    inp[i]       =(data[i*4]  /255-mean[0])/std[0];
    inp[S*S+i]   =(data[i*4+1]/255-mean[1])/std[1];
    inp[2*S*S+i] =(data[i*4+2]/255-mean[2])/std[2];
  }
  const inName=onnxSession.inputNames[0];
  const res=await onnxSession.run({[inName]:new ort.Tensor('float32',inp,[1,3,S,S])});
  const t=res[onnxSession.outputNames[0]];
  const d=t.data, dims=t.dims;
  const OH=dims[dims.length-2], OW=dims[dims.length-1];
  const sig=v=>1/(1+Math.exp(-v));
  const needSig=d[0]<-0.5||d[0]>1.01;
  const mc=document.createElement('canvas'); mc.width=OW; mc.height=OH;
  const mctx=mc.getContext('2d');
  const img=mctx.createImageData(OW,OH);
  let hasNail=false;
  for (let i=0;i<OH*OW;i++) {
    const p=needSig?sig(d[i]):d[i];
    const v=p>threshold?255:0; if(v) hasNail=true;
    img.data[i*4]=img.data[i*4+1]=img.data[i*4+2]=v; img.data[i*4+3]=255;
  }
  if(!hasNail) return null;
  mctx.putImageData(img,0,0); return mc;
}

// Overlay
function overlayMask(maskCanvas,rx,ry,rw,rh,opacity,edgeBlur,blendMode) {
  const oc=document.createElement('canvas'); oc.width=rw; oc.height=rh;
  const octx=oc.getContext('2d');
  if (showMask) {
    octx.drawImage(maskCanvas,0,0,rw,rh);
    ctx.globalAlpha=0.65; ctx.globalCompositeOperation='source-over';
    ctx.drawImage(oc,rx,ry);
  } else {
    octx.drawImage(maskCanvas,0,0,rw,rh);
    octx.globalCompositeOperation='source-in';
    octx.fillStyle=currentColor; octx.fillRect(0,0,rw,rh);
    if (edgeBlur>0) octx.filter=`blur(${edgeBlur}px)`;
    ctx.globalAlpha=opacity; ctx.globalCompositeOperation=blendMode;
    ctx.drawImage(oc,rx,ry);
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
}

// Placeholder
function drawPlaceholder(cx,cy,nailLen,dx,dy,opacity,blendMode) {
  const r=parseInt(currentColor.slice(1,3),16),g=parseInt(currentColor.slice(3,5),16),b=parseInt(currentColor.slice(5,7),16);
  ctx.save(); ctx.globalAlpha=opacity*0.8; ctx.globalCompositeOperation=blendMode;
  ctx.translate(cx,cy); ctx.rotate(Math.atan2(dy,dx)+Math.PI/2);
  const grd=ctx.createRadialGradient(0,0,0,0,0,nailLen*0.8);
  grd.addColorStop(0,`rgba(${r},${g},${b},1)`); grd.addColorStop(0.7,`rgba(${r},${g},${b},0.7)`); grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.beginPath(); ctx.ellipse(0,0,nailLen*0.3,nailLen*0.5,0,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill(); ctx.restore();
}

setDot('mp','idle'); setDot('onnx','idle'); setDot('cam','idle');
</script>
